# Root config.
# Layered load: repo `.codex/` (cwd/parents) overrides `~/.codex` and `/etc/codex`.
# GPT-5.4 is the current recommended Codex model.
# For compatibility fallbacks, pin a prior model explicitly.
model = "gpt-5.4"
model_reasoning_effort = "xhigh"

# No approval prompts
approval_policy = "never"

# Workspace-only access
sandbox_mode = "workspace-write"
personality = "pragmatic"

# Note: this block only applies when sandbox_mode = "workspace-write".
[sandbox_workspace_write]
network_access = true

tool_output_token_limit = 25000
web_search = "live"

[features]
ghost_commit = false
unified_exec = true
apply_patch_freeform = true
skills = true
shell_snapshot = true
multi_agent = true

[beta]
rmcp = true

[notice]
hide_full_access_warning = true

[projects."/Users/ak/Dev/"]
trust_level = "trusted"

[projects."/Users/ak/Dev/personal/BPM"]
trust_level = "trusted"

[projects."/Users/ak/Dev/quiet/command"]
trust_level = "trusted"
