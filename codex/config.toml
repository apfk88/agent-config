# Root config.
# Layered load: repo `.codex/` (cwd/parents) overrides `~/.codex` and `/etc/codex`.
# GPT-5.5 is the current recommended Codex model.
# For compatibility fallbacks, pin a prior model explicitly.
model = "gpt-5.5"
model_reasoning_effort = "xhigh"
plan_mode_reasoning_effort = "xhigh"
model_verbosity = "low"
service_tier = "fast"

# No approval prompts
approval_policy = "never"

# Workspace-only access
sandbox_mode = "workspace-write"
personality = "pragmatic"

# Note: this block only applies when sandbox_mode = "workspace-write".
notify = ["/Users/kvamme/.codex/plugins/cache/openai-bundled/computer-use/1.0.758/Codex Computer Use.app/Contents/SharedSupport/SkyComputerUseClient.app/Contents/MacOS/SkyComputerUseClient", "turn-ended"]

tool_output_token_limit = 25000
web_search = "live"

[sandbox_workspace_write]
network_access = true

[features]
apply_patch_freeform = true
fast_mode = true
multi_agent = true
memories = true

[notice]
hide_full_access_warning = true

