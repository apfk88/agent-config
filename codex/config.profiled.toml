# Profile-based config (comparison copy).
# Root is minimal so profiles fully control behavior.
profile = "ak-main"

[profiles.ak-main]
# GPT-5.4 is the current recommended Codex model.
# For compatibility fallbacks, pin a prior model explicitly.
model = "gpt-5.4"
model_reasoning_effort = "xhigh"

# No approval prompts
approval_policy = "never"

# Workspace-only access
sandbox_mode = "workspace-write"

# Note: this block only applies when sandbox_mode = "workspace-write".
[profiles.ak-main.sandbox_workspace_write]
network_access = true

tool_output_token_limit = 25000

[profiles.ak-main.features]
ghost_commit = false
unified_exec = true
apply_patch_freeform = true
web_search = true
skills = true
shell_snapshot = true

[profiles.ak-main.notice]
hide_full_access_warning = true

[profiles.default]
# Intentionally empty: falls back to built-in defaults.

[projects."/Users/ak/Dev/"]
trust_level = "trusted"

[projects."/Users/ak/Dev/personal/BPM"]
trust_level = "trusted"

[projects."/Users/ak/Dev/quiet/command"]
trust_level = "trusted"
